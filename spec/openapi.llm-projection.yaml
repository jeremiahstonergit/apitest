                            id:
                              type: string
                            name:
                              type: string
                            type:
                              type: string
                            status:
                              type: boolean
                            disabled:
                              type: boolean
                            lastResult:
                              type: boolean
                            tsLastResult:
                              type:
                              - 'null'
                            tsDeltaResult:
