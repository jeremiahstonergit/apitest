openapi: 3.0.3
info:
  title: SpaceWeb API (LLM projection)
  version: 0.3.0-mvp
  description: Virtual LLM-friendly projection. Not directly executable against api.sweb.ru.
servers:
- url: https://virtual.sweb.local
  description: Virtual server for LLM planning
security:
- bearerAuth: []
paths:
  /rpc/domains/bonus/index:
    post:
      tags:
      - domains
      summary: Получение информации о доменных бонусах
      operationId: domains_bonus_index
      x-sweb-upstream-path: /domains/bonus/
      x-sweb-upstream-method: index
      x-sweb-transport: jsonrpc-over-http
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  properties:
                    page:
                      type: integer
                      description: Страница
                    orderBy:
                      type: string
                      description: Cортировка null, valid_till, date_used
                    orderType:
                      type: string
                      description: Направление сортировки ASC, DESC
                    used:
                      type: boolean
                      description: Фильтр по использованным null, true, false
                  additionalProperties: false
                  required:
                  - page
                id:
                  type: string
                user:
                  type: string
              required:
              - params
              additionalProperties: false
      responses:
        '200':
          description: JSON-RPC response envelope
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    example: '2.0'
                  id:
                    type: string
                  version:
                    type: string
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        bonuses:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              type:
                                type: string
                              customer_id:
                                type: string
                              use_type:
                                type:
                                - 'null'
                              ts_create:
                                type: string
                              valid_till:
                                type: string
                              domain:
                                type:
                                - 'null'
                              payment_id:
                                type: string
                              bonus_id:
                                type: string
                              bonus_title:
                                type:
                                - 'null'
                              type_title:
                                type: string
                              tld:
                                type: string
                              used:
                                type: string
                              ts_close:
                                type:
                                - 'null'
                            additionalProperties: true
                        count:
                          type: integer
                        unusedCount:
                          type: integer
                      additionalProperties: true
                  error:
                    $ref: '#/components/schemas/RpcError'
                additionalProperties: true
      security:
      - bearerAuth: []
  /rpc/domains/bonus/getList:
    post:
      tags:
      - domains
      summary: Получение доступных к покупке пакетов бонусов
      operationId: domains_bonus_getList
