        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: object
                  properties:
                    page:
                      type: integer
                      description: номер страницы. если задан, то используется пагинация
                    perPage:
                      type: integer
                      description: кол-во единиц на странице, не больше 20
                  additionalProperties: false
                id:
                  type: string
                user:
                  type: string
              required:
